  header { padding: 16px 24px; background: #fff; border-bottom: 1px solid #e0e0e0; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 16px; font-weight: 500; }
  #status { font-size: 13px; color: #666; margin-left: auto; }
  
  #panels { display: flex; height: calc(100vh - 53px); }
  .panel { display: flex; flex-direction: column; position: relative; }
  .panel + .panel { border-left: 1px solid #e0e0e0; }
  
  #left-panel { flex: 0 0 30%; }
  
  .panel-title { 
    font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; 
    letter-spacing: 0.05em; padding: 10px 16px; background: #fff; border-bottom: 1px solid #e0e0e0; 
  }
  .plot { flex: 1; min-height: 0; }

  #pca-container { flex: 1.35; display: flex; flex-direction: column; position: relative; }
  #rarefaction-container { flex: 1.35; display: flex; flex-direction: column; border-top: 1px solid #e0e0e0; }

  #family-box {
    display: none; position: absolute; background: #fff; border: 1px solid #e0e0e0;
    border-radius: 6px; padding: 10px 14px; font-size: 13px; pointer-events: none;
    z-index: 100; min-width: 180px; box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  #family-box .box-title { font-weight: 500; font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }
  #family-box .family-row { display: flex; justify-content: space-between; gap: 16px; padding: 3px 0; border-bottom: 0.5px solid #f0f0f0; }
  #family-box .family-row:last-child { border-bottom: none; }
</style>

const GLOBAL_MAX_RICHNESS = 66.2;

function parseWkt(wkt) {
  const coords = wkt.replace('POLYGON((','').replace('))','').split(',');
  const lons = [], lats = [];
  coords.forEach(pair => {
    const [lon, lat] = pair.trim().split(' ').map(Number);
    lons.push(lon); lats.push(lat);
  });
  return { lons, lats };
}

// PCA Plot
const ids = DATA.map(d => d.id || d.cell_id);
const pc1 = DATA.map(d => d.pc1);
const pc2 = DATA.map(d => d.pc2);

const defaultColor = '#378ADD';
const highlightColor = '#D85A30';

Plotly.newPlot('pca', [{
  x: pc1, y: pc2,
  mode: 'markers', type: 'scatter',
  text: ids,
  hoverinfor: 'none',
  hovermode: false,
  hovertemplate: '<extra></extra>',
  marker: { color: defaultColor, opacity: 0.75, size: 8, line: {width: 1, color: '#fff'} }
}], {
  margin: { t: 24, r: 24, b: 48, l: 56 },
  xaxis: { title: 'PC1' },
  yaxis: { title: 'PC2' },
  hovermode: 'closest'
}, { responsive: true, displayModeBar: false });

// Map (unchanged)
const mapTraces = DATA.map(d => {
  const { lons, lats } = parseWkt(d.polygon_wkt);
  return { type: 'scattermapbox', lon: lons, lat: lats, mode: 'lines', fill: 'toself',
    fillcolor: 'rgba(55,138,221,0.35)', line: { color: '#185FA5', width: 1 },
    text: d.id || d.cell_id, showlegend: false };
});

Plotly.newPlot('map', mapTraces, {
  mapbox: { style: 'carto-positron', center: { lon: 9.35, lat: 56.35 }, zoom: 6 },
  margin: { t: 0, r: 0, b: 0, l: 0 }
}, { responsive: true, displayModeBar: false });

// Family Box (kept from your original)
const familyBox = document.getElementById('family-box');
const familyRows = document.getElementById('family-rows');

function showFamilyBox(x, y, families) {
  familyRows.innerHTML = families.map(f => 
    `<div class="family-row"><span class="family-name">${f.family}</span><span class="family-count">${f.count.toLocaleString()}</span></div>`
  ).join('');
  familyBox.style.left = (x + 8) + 'px';
  familyBox.style.top  = (y - 8) + 'px';
  familyBox.style.display = 'block';
}

function hideFamilyBox() { familyBox.style.display = 'none'; }

// Rarefaction with FIXED global Y-axis
function renderRarefaction(site) {
  const rare = site.rarefaction;
  if (!rare?.effort?.length) {
    Plotly.newPlot('rarefaction', [], { title: 'No rarefaction data' });
    return;
  }

  const traces = [{
    x: rare.effort,
    y: rare.richness_mean,
    mode: 'lines+markers',
    name: 'Mean Richness',
    line: { color: '#1f77b4', width: 3 }
  }];

  if (rare.richness_lower && rare.richness_upper) {
    traces.push({
      x: rare.effort.concat(rare.effort.slice().reverse()),
      y: rare.richness_upper.concat(rare.richness_lower.slice().reverse()),
      fill: 'toself',
      fillcolor: 'rgba(31,119,180,0.25)',
      line: { color: 'transparent' },
      name: '95% CI'
    });
  }

  Plotly.newPlot('rarefaction', traces, {
    title: `Rarefaction Curve — ${(site.id || site.cell_id)}`,
    xaxis: { title: 'Number of Observations' },
    yaxis: { 
      title: 'Number of Families Detected',
      range: [0, GLOBAL_MAX_RICHNESS * 1.05],   // Fixed global scale with small padding
      rangemode: 'tozero'
    },
    margin: { t: 45, b: 80, l: 65, r: 30 },
    legend: { orientation: 'h', y: -0.28 }
  }, { responsive: true });
}

// Click handler
document.getElementById('pca').on('plotly_click', function(eventData) {
  const pt = eventData.points[0];
  const i = pt.pointIndex;
  const site = DATA[i];

  Plotly.restyle('pca', {
    'marker.color': [DATA.map((_, j) => j === i ? highlightColor : defaultColor)],
    'marker.opacity': [DATA.map((_, j) => j === i ? 1.0 : 0.35)],
    'marker.size': [DATA.map((_, j) => j === i ? 12 : 7)]
  }, [0]);

  Plotly.restyle('map', {
    fillcolor: DATA.map((_, j) => j === i ? 'rgba(216,90,48,0.7)' : 'rgba(55,138,221,0.35)'),
    'line.color': DATA.map((_, j) => j === i ? '#993C1D' : '#185FA5'),
    'line.width': DATA.map((_, j) => j === i ? 2.5 : 1)
  }, DATA.map((_, j) => j));

  document.getElementById('status').textContent = `Selected: ${(site.id || site.cell_id)}`;
  document.getElementById('selected-site').textContent = `— ${(site.id || site.cell_id)}`;

  renderRarefaction(site);

  if (site.top_families?.length > 0) {
    const e = eventData.event;
    showFamilyBox(e.clientX, e.clientY, site.top_families);
  } else hideFamilyBox();
});

document.getElementById('pca').on('plotly_doubleclick', function() {
  Plotly.restyle('pca', { 
    'marker.color': [DATA.map(() => defaultColor)], 
    'marker.opacity': [DATA.map(() => 0.7)], 
    'marker.size': [DATA.map(() => 8)] 
  }, [0]);

  Plotly.restyle('map', {
    fillcolor: DATA.map(() => 'rgba(55,138,221,0.35)'),
    'line.color': DATA.map(() => '#185FA5'),
    'line.width': DATA.map(() => 1)
  }, DATA.map((_, j) => j));

  document.getElementById('status').textContent = 'Click a point on the PCA plot to highlight it and view rarefaction curve';
  document.getElementById('selected-site').textContent = '';
  hideFamilyBox();
});

// Initial plot
if (DATA.length > 0) renderRarefaction(DATA[0]);
</script>

<div id="contact-form" style="position:fixed; top:60px; right:24px; background:#fff; border:1px solid #e0e0e0; border-radius:8px; padding:16px; width:260px; box-shadow:0 4px 16px rgba(0,0,0,0.12); z-index:200;">
  <div style="font-size:13px; font-weight:500; margin-bottom:10px;">Sign up for the Beta</div>
  <input id="contact-email" type="email" placeholder="Your email" style="width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:5px; font-size:13px; margin-bottom:8px;">
  <textarea id="contact-msg" placeholder="Tell us what you need.." rows="4" style="width:100%; padding:7px 10px; border:1px solid #ddd; border-radius:5px; font-size:13px; resize:none; margin-bottom:8px;"></textarea>
  <button onclick="sendContact()" style="width:100%; background:#378ADD; color:#fff; border:none; border-radius:5px; padding:8px; font-size:13px; cursor:pointer;">Send</button>
  <div id="contact-status" style="font-size:12px; color:#666; margin-top:6px; text-align:center;"></div>
</div>

<script>
async function sendContact() {
  const email = document.getElementById('contact-email').value.trim();
  const msg   = document.getElementById('contact-msg').value.trim();
  const status = document.getElementById('contact-status');
  if (!email || !msg) { status.textContent = 'Please fill in both fields.'; return; }

  status.textContent = 'Sending…';
  try {
    const res = await fetch('https://formspree.io/f/mykoqnre', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ email, message: msg })
    });
    if (res.ok) {
      status.textContent = '✓';
      document.getElementById('contact-email').value = '';
      document.getElementById('contact-msg').value = '';
    } else {
      status.textContent = 'Something went wrong. Please try again.';
    }
  } catch {
    status.textContent = 'Network error. Please try again.';
  }
}
</script>
